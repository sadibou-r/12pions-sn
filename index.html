<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="logo.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  button, .cell, .piece { -webkit-touch-callout: none; user-select: none; }
  :root { --cell: 90px; --piece: 64px; --piece-font: 1.6em; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background:
      radial-gradient(ellipse at 10% 0%, rgba(0,133,63,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 100%, rgba(227,27,35,0.18) 0%, transparent 50%),
      linear-gradient(180deg, #1a0f08 0%, #2d1810 100%);
    color: #f4ead5;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin: 0;
    font-size: 2.2em;
    letter-spacing: 3px;
    color: #fdef42;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6), 0 0 20px rgba(253,239,66,0.3);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  h1 .star { color: #00853f; font-size: 0.9em; }
  .subtitle {
    font-size: 0.85em;
    letter-spacing: 4px;
    color: #fdef42cc;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .flag-stripe {
    display: flex;
    width: 220px;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    margin: 6px 0 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .flag-stripe div { flex: 1; }
  .flag-stripe .g { background: #00853f; }
  .flag-stripe .y { background: #fdef42; position: relative; }
  .flag-stripe .y::after {
    content: "★";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #00853f;
    font-size: 8px;
  }
  .flag-stripe .r { background: #e31b23; }
  #status {
    font-size: 1.1em;
    margin: 10px auto 6px;
    min-height: 1.5em;
    text-align: center;
    color: #fdef42;
    letter-spacing: 1px;
    font-weight: 600;
    padding: 8px 22px;
    background: linear-gradient(180deg, rgba(45,24,16,0.85), rgba(31,18,10,0.85));
    border: 1px solid rgba(253,239,66,0.35);
    border-radius: 10px;
    box-shadow:
      0 4px 14px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 0 18px rgba(253,239,66,0.12);
    text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 10px rgba(253,239,66,0.3);
    width: fit-content;
    max-width: 92vw;
  }
  #status .badge-color { vertical-align: middle; }
  #status .name-X {
    color: #4ee08d;
    font-weight: 800;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 8px rgba(78,224,141,0.5);
  }
  #status .name-O {
    color: #ff7a7a;
    font-weight: 800;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 8px rgba(255,122,122,0.5);
  }
  #turnTimer {
    font-size: 0.95em;
    margin: 0 0 14px;
    min-height: 1.2em;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fdef42;
    text-align: center;
  }
  #turnTimer.warn { color: #ff5c5c; animation: timer-pulse 0.8s ease-in-out infinite; }
  @keyframes timer-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.1); }
  }
  .piece.demo-jumped { animation: demo-jumped 1.6s ease-in-out; }
  @keyframes demo-jumped {
    0%   { opacity: 1; }
    30%  { opacity: 0.2; filter: grayscale(1); }
    80%  { opacity: 0.2; filter: grayscale(1); }
    100% { opacity: 1; filter: none; }
  }
  #oopsBanner {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%) scale(0.6);
    z-index: 300;
    pointer-events: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-weight: 900;
    font-size: 2.4em;
    letter-spacing: 4px;
    color: #fdef42;
    text-shadow:
      0 0 12px rgba(253,239,66,0.9),
      0 0 32px rgba(227,27,35,0.7),
      0 4px 12px rgba(0,0,0,0.8);
    background: rgba(45,24,16,0.92);
    border: 3px solid #e31b23;
    border-radius: 14px;
    padding: 10px 28px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    text-align: center;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  #oopsBanner.show {
    opacity: 1;
    transform: translateX(-50%) scale(1) rotate(-2deg);
    animation: oops-shake 0.5s ease-in-out 0.25s;
  }
  #oopsBanner small {
    font-size: 0.5em;
    letter-spacing: 3px;
    color: #f4ead5;
    font-weight: 700;
    margin-left: 10px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }
  @keyframes oops-shake {
    0%, 100% { transform: translateX(-50%) scale(1) rotate(-2deg); }
    25%      { transform: translateX(-50%) scale(1.05) rotate(2deg); }
    75%      { transform: translateX(-50%) scale(1.05) rotate(-4deg); }
  }
  @media (max-width: 560px) {
    #oopsBanner { font-size: 1.6em; letter-spacing: 3px; padding: 8px 18px; }
  }
  #coudouBanner {
    position: fixed;
    top: 22%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    z-index: 290;
    pointer-events: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-weight: 900;
    font-size: 3em;
    letter-spacing: 5px;
    color: #fdef42;
    text-shadow:
      0 0 12px rgba(0,133,63,0.9),
      0 0 28px rgba(253,239,66,0.6),
      0 4px 10px rgba(0,0,0,0.8);
    background: rgba(45,24,16,0.88);
    border: 3px solid #00853f;
    border-radius: 14px;
    padding: 12px 28px;
    opacity: 0;
    text-align: center;
    white-space: nowrap;
  }
  #coudouBanner.show {
    animation: coudou-pop 1.4s ease-out forwards;
  }
  @keyframes coudou-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-6deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(4deg); }
    35%  { transform: translate(-50%, -50%) scale(0.95) rotate(-3deg); }
    50%  { transform: translate(-50%, -50%) scale(1) rotate(2deg); }
    85%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.85) rotate(0); }
  }
  .piece.chain-active {
    animation: chain-pulse 0.7s ease-in-out infinite;
  }
  @keyframes chain-pulse {
    0%, 100% {
      box-shadow:
        inset 0 -4px 10px rgba(0,0,0,0.45),
        inset 0 4px 8px rgba(255,255,255,0.3),
        0 4px 8px rgba(0,0,0,0.5),
        0 0 0 0 rgba(253,239,66,0.85);
    }
    50% {
      box-shadow:
        inset 0 -4px 10px rgba(0,0,0,0.45),
        inset 0 4px 8px rgba(255,255,255,0.3),
        0 4px 8px rgba(0,0,0,0.5),
        0 0 0 8px rgba(253,239,66,0);
    }
  }
  @media (max-width: 560px) {
    #coudouBanner { font-size: 1.8em; letter-spacing: 3px; padding: 10px 20px; }
  }
  #arena {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: stretch;
  }
  .panel {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    backdrop-filter: blur(6px);
    transition: box-shadow 0.4s, border-color 0.4s;
  }
  .panel-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }
  .panel.active-X { border-color: #1ec96b; box-shadow: 0 0 32px rgba(0,133,63,0.55); }
  .panel.active-O { border-color: #ff5c5c; box-shadow: 0 0 32px rgba(227,27,35,0.55); }
  .panel-title {
    font-size: 1.2em;
    font-weight: 700;
    text-align: center;
    letter-spacing: 2px;
  }
  .panel-X .panel-title { color: #1ec96b; }
  .panel-O .panel-title { color: #ff5c5c; }
  .panel-count {
    text-align: center;
    font-size: 1.8em;
    font-weight: 700;
    line-height: 1;
  }
  .trophy-pile {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    flex: 1;
    min-height: 40px;
    padding: 6px 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
  }
  .trophy {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 0.85em;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.6);
    animation: trophy-drop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .trophy.X { background: radial-gradient(circle at 30% 30%, #4ee08d, #00853f 70%, #005029); }
  .trophy.O { background: radial-gradient(circle at 30% 30%, #ff7a7a, #e31b23 70%, #8a1015); }
  @keyframes trophy-drop {
    0%   { transform: scale(0) rotate(-90deg); opacity: 0; }
    60%  { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }
  #board {
    display: grid;
    grid-template-columns: repeat(5, var(--cell));
    grid-template-rows: repeat(5, var(--cell));
    background: linear-gradient(145deg, #c89058, #8a5a28);
    padding: 14px;
    border-radius: 12px;
    border: 2px solid rgba(253,239,66,0.4);
    box-shadow:
      0 12px 40px rgba(0,0,0,0.6),
      0 0 0 4px rgba(0,133,63,0.25),
      inset 0 2px 6px rgba(255,255,255,0.18),
      inset 0 -4px 10px rgba(0,0,0,0.35);
  }
  .cell {
    background: linear-gradient(145deg, #ecc89c, #d2a472);
    border: 1px solid rgba(74,48,23,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.2s, transform 0.15s;
  }
  .cell.zone-X { background: linear-gradient(145deg, #b8e0bd, #7fb88a); }
  .cell.zone-O { background: linear-gradient(145deg, #f0b8b8, #d68080); }
  .cell:hover { filter: brightness(1.08); }
  .cell.center::before, .cell.center::after {
    content: "";
    position: absolute;
    width: 70%;
    height: 3px;
    background: rgba(74,48,23,0.55);
    border-radius: 2px;
    pointer-events: none;
    z-index: 0;
  }
  .cell.center::before { transform: rotate(45deg); }
  .cell.center::after  { transform: rotate(-45deg); }
  .cell.selected {
    background: linear-gradient(145deg, #fff5a0, #fdef42) !important;
    box-shadow: inset 0 0 22px rgba(253,239,66,0.9);
  }
  .piece {
    width: var(--piece);
    height: var(--piece);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: var(--piece-font);
    color: white;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
    user-select: none;
    z-index: 2;
  }
  .piece:hover { transform: scale(1.05); }
  .piece.X {
    background: radial-gradient(circle at 30% 30%, #4ee08d, #00853f 60%, #003d1d);
    box-shadow:
      inset 0 -4px 10px rgba(0,0,0,0.45),
      inset 0 4px 8px rgba(255,255,255,0.3),
      0 4px 8px rgba(0,0,0,0.5);
  }
  .piece.O {
    background: radial-gradient(circle at 30% 30%, #ff7a7a, #e31b23 60%, #7a0d12);
    box-shadow:
      inset 0 -4px 10px rgba(0,0,0,0.45),
      inset 0 4px 8px rgba(255,255,255,0.3),
      0 4px 8px rgba(0,0,0,0.5);
  }
  .piece.dame::after {
    content: "♛";
    position: absolute;
    font-size: 1.2em;
    color: gold;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .piece.appearing { animation: piece-in 0.25s ease-out; }
  @keyframes piece-in {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .piece.dying { animation: piece-die 0.4s forwards; }
  @keyframes piece-die {
    0%   { transform: scale(1) rotate(0); opacity: 1; }
    50%  { transform: scale(1.3) rotate(15deg); opacity: 0.8; filter: brightness(1.5); }
    100% { transform: scale(0) rotate(45deg); opacity: 0; }
  }
  .piece.dame-promote { animation: dame-glow 0.8s ease-out; }
  @keyframes dame-glow {
    0%   { box-shadow: 0 0 0 0 rgba(255,215,0,0.9); }
    50%  { box-shadow: 0 0 30px 12px rgba(255,215,0,0.7); transform: scale(1.15); }
    100% { box-shadow: inset 0 -4px 10px rgba(0,0,0,0.4), inset 0 4px 8px rgba(255,255,255,0.3), 0 4px 8px rgba(0,0,0,0.5); }
  }
  #controls {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #muteBtn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; }
  #muteBtn svg { display: block; }
  button {
    padding: 10px 22px;
    font-size: 0.95em;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: linear-gradient(145deg, #1ec96b, #00853f);
    color: white;
    letter-spacing: 0.5px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform 0.1s, filter 0.15s;
  }
  button:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.danger { background: linear-gradient(145deg, #ff5c5c, #c41a22); }
  button.neutral {
    background: linear-gradient(145deg, #fdef42, #d4c020);
    color: #2d1810;
    text-shadow: none;
  }
  button.side-X {
    background: linear-gradient(145deg, #4ee08d, #00853f);
    flex: 1;
  }
  button.side-O {
    background: linear-gradient(145deg, #ff7a7a, #c41a22);
    flex: 1;
  }
  button.side-X.chosen, button.side-O.chosen, button.chosen {
    outline: 3px solid #fdef42;
    outline-offset: 2px;
  }
  button.expert {
    background: linear-gradient(90deg, #00853f 0%, #00853f 33%, #fdef42 50%, #e31b23 67%, #e31b23 100%);
    color: #1a1a1a;
    font-weight: 800;
    border: 1px solid rgba(0,0,0,0.45);
    text-shadow: 0 1px 2px rgba(255,255,255,0.4);
    box-shadow: 0 3px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  #lobby, #aiModal {
    position: fixed;
    inset: 0;
    background: rgba(10,12,20,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .lobby-card {
    background: linear-gradient(180deg, #2d1810, #1f120a);
    border: 1px solid rgba(253,239,66,0.25);
    border-radius: 14px;
    padding: 28px 32px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,133,63,0.2);
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .lobby-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #00853f 33%, #fdef42 33%, #fdef42 66%, #e31b23 66%);
  }
  .lobby-card h2 {
    margin: 4px 0 4px;
    text-align: center;
    letter-spacing: 3px;
    color: #fdef42;
    font-size: 1.6em;
  }
  .lobby-card .welcome {
    text-align: center;
    color: #f4ead5;
    font-size: 0.95em;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .lobby-card .welcome em {
    color: #fdef42;
    font-style: normal;
    font-weight: 600;
  }
  .lobby-card .row { display: flex; gap: 8px; width: 100%; }
  .lobby-card .row input { min-width: 0; }
  .lobby-card .row button { flex: 1 1 0; min-width: 0; padding: 10px 8px; }
  .lobby-card input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: #14172a;
    color: white;
    font-size: 1.1em;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
  }
  .lobby-card .sep {
    text-align: center;
    color: #666;
    font-size: 0.85em;
    margin: 4px 0;
  }
  #lobbyStatus {
    text-align: center;
    color: #ffd96a;
    min-height: 1.2em;
    font-size: 0.95em;
    word-break: break-all;
  }
  .badge-color {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.85em;
    font-weight: 600;
    margin-left: 8px;
  }
  .badge-color.X { background: #00853f; }
  .badge-color.O { background: #e31b23; }

  #modal {
    position: fixed;
    inset: 0;
    background: rgba(10,12,20,0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
    animation: modal-fade 0.2s ease-out;
  }
  #modal.hidden { display: none; }
  @keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    background: linear-gradient(180deg, #2d1810, #1f120a);
    border: 1px solid rgba(253,239,66,0.3);
    border-radius: 14px;
    padding: 24px 28px 20px;
    width: 360px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,133,63,0.2);
    position: relative;
    overflow: hidden;
    animation: modal-pop 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modal-pop {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #00853f 33%, #fdef42 33%, #fdef42 66%, #e31b23 66%);
  }
  .modal-card h3 {
    margin: 6px 0 12px;
    color: #fdef42;
    text-align: center;
    letter-spacing: 1.5px;
    font-size: 1.1em;
  }
  .modal-card p {
    color: #f4ead5;
    font-size: 0.95em;
    line-height: 1.5;
    text-align: center;
    margin: 0 0 18px;
    white-space: pre-line;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .modal-actions button { padding: 9px 18px; font-size: 0.9em; }

  @media (max-width: 560px) {
    :root { --cell: 60px; --piece: 44px; --piece-font: 1.1em; }
    body { padding: 10px; }
    h1 { font-size: 1.5em; letter-spacing: 2px; }
    h1 .star { font-size: 0.8em; }
    .subtitle { font-size: 0.7em; letter-spacing: 2px; }

<script>
const SIZE = 5;

let board, turn, selected, mustContinueFrom, surplaceMode, gameOver;
let surplaceTargets = new Set();
let preMoveCaptureSet = new Set();
let preMoveCaptureMoves = new Map();
let surplaceDemos = new Map();
let turnStartFrom = null;
let turnDidCapture = false;
let lastMoveTo = null;
// Trophies: pieces each player has captured. trophiesX = O pieces taken by X.
let trophiesX = 0, trophiesO = 0;
let drawRequests = { X: 0, O: 0 };
const MAX_DRAW_REQUESTS = 3;
// Animation queue: cells that should play "appearing" animation on next render.
let pendingAppear = new Set();
let pendingPromote = new Set();
let pendingChain = null;
let captureCountThisTurn = 0;

// --- Online ---
let socket = null;
let online = false;
let myColor = null;
let applyingRemote = false;

// --- AI ---
let vsAI = false;
let aiColor = null;       // 'O' by default (player plays Vert)
let aiDifficulty = 4;     // 2 (facile) | 4 (moyen) | 6 (difficile)
let aiThinking = false;

function send(msg) {
  if (socket && socket.readyState === 1) socket.send(JSON.stringify(msg));
}
function broadcast(action) {
  if (online && !applyingRemote) send({type:'action', action});
}
function isMyTurn() { return !online || turn === myColor; }

function initState() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
  for (let c = 0; c < 5; c++) board[0][c] = { p: 'X', dame: false };
  for (let c = 0; c < 5; c++) board[1][c] = { p: 'X', dame: false };
  board[2][0] = { p: 'X', dame: false };
  board[2][1] = { p: 'X', dame: false };
  for (let c = 0; c < 5; c++) board[4][c] = { p: 'O', dame: false };
  for (let c = 0; c < 5; c++) board[3][c] = { p: 'O', dame: false };
  board[2][3] = { p: 'O', dame: false };
  board[2][4] = { p: 'O', dame: false };
  turn = 'X';
  selected = null;
  mustContinueFrom = null;
  surplaceMode = false;
  gameOver = false;
  surplaceTargets = new Set();
  surplaceDemos = new Map();
  preMoveCaptureSet = new Set();
  preMoveCaptureMoves = new Map();
  turnStartFrom = null;
  turnDidCapture = false;
  lastMoveTo = null;
  trophiesX = 0; trophiesO = 0;
  drawRequests = { X: 0, O: 0 };
  pendingAppear.clear();
  pendingPromote.clear();
  pendingChain = null;
  captureCountThisTurn = 0;
  document.getElementById('trophyX').innerHTML = '';
  document.getElementById('trophyO').innerHTML = '';
  snapshotPreMove();
}

function opponent(p) { return p === 'X' ? 'O' : 'X'; }
function forwardDir(p) { return p === 'X' ? 1 : -1; }
function pionDirs(p) { return [[forwardDir(p), 0], [0, -1], [0, 1]]; }
const ORTHO = [[1,0],[-1,0],[0,1],[0,-1]];
function inBounds(r, c) { return r>=0 && r<SIZE && c>=0 && c<SIZE; }
function key(r,c) { return r + ',' + c; }

function snapshotPreMove() {
  preMoveCaptureSet = new Set();
  preMoveCaptureMoves = new Map();
  for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
    const p = board[r][c];
    if (p && p.p === turn) {
      const moves = captureMoves(r,c);
      if (moves.length > 0) {
        preMoveCaptureSet.add(key(r,c));
        preMoveCaptureMoves.set(key(r,c), moves);
      }
    }
  }
  turnStartFrom = null;
  turnDidCapture = false;
}

function simpleMoves(r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const out = [];
  if (piece.dame) {
    for (const [dr,dc] of ORTHO) {
      let nr = r+dr, nc = c+dc;
      while (inBounds(nr,nc) && !board[nr][nc]) { out.push({r:nr, c:nc}); nr += dr; nc += dc; }
    }
  } else {
    for (const [dr,dc] of pionDirs(piece.p)) {
      const nr = r+dr, nc = c+dc;
      if (inBounds(nr,nc) && !board[nr][nc]) out.push({r:nr, c:nc});
    }
  }
  return out;
}

function captureMoves(r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const out = [];
  if (piece.dame) {
    for (const [dr,dc] of ORTHO) {
      let nr = r+dr, nc = c+dc;
      while (inBounds(nr,nc) && !board[nr][nc]) { nr += dr; nc += dc; }
      if (!inBounds(nr,nc)) continue;
      if (board[nr][nc].p === piece.p) continue;
      const capR = nr, capC = nc;
      let lr = nr+dr, lc = nc+dc;
      while (inBounds(lr,lc) && !board[lr][lc]) {
        out.push({r:lr, c:lc, captured:{r:capR, c:capC}});
        lr += dr; lc += dc;
      }
    }
  } else {
    for (const [dr,dc] of pionDirs(piece.p)) {
      const mr = r+dr, mc = c+dc;
      const lr = r+2*dr, lc = c+2*dc;
      if (!inBounds(lr,lc)) continue;
      const mid = board[mr][mc];
      if (mid && mid.p !== piece.p && !board[lr][lc]) {
        out.push({r:lr, c:lc, captured:{r:mr, c:mc}});
      }
    }
  }
  return out;
}

function allMovesForPlayer(p) {
  const list = [];
  for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
    if (board[r][c] && board[r][c].p === p) {
      for (const m of simpleMoves(r,c)) list.push({from:{r,c}, to:m, capture:false});
      for (const m of captureMoves(r,c)) list.push({from:{r,c}, to:{r:m.r,c:m.c}, capture:true, captured:m.captured});
    }
  }
  return list;
}

function countPieces(p) {
  let n = 0;
  for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++)
    if (board[r][c] && board[r][c].p === p) n++;
  return n;
}

function maybePromote(r, c) {
  const piece = board[r][c];
  if (!piece || piece.dame) return false;
  if (piece.p === 'X' && r === SIZE-1) { piece.dame = true; return true; }
  if (piece.p === 'O' && r === 0) { piece.dame = true; return true; }
  return false;
}

// --- AI engine (minimax alpha-bêta) ---
function cloneBoard(b) {
  return b.map(row => row.map(cell => cell ? {p: cell.p, dame: cell.dame} : null));
}
function aiCaptureMoves(b, r, c) {
  const piece = b[r][c];
  if (!piece) return [];
  const out = [];
  if (piece.dame) {
    for (const [dr,dc] of ORTHO) {
      let nr = r+dr, nc = c+dc;
      while (inBounds(nr,nc) && !b[nr][nc]) { nr += dr; nc += dc; }
      if (!inBounds(nr,nc)) continue;
      if (b[nr][nc].p === piece.p) continue;
      const capR = nr, capC = nc;
      let lr = nr+dr, lc = nc+dc;
      while (inBounds(lr,lc) && !b[lr][lc]) {
        out.push({r:lr, c:lc, captured:{r:capR, c:capC}});
        lr += dr; lc += dc;
      }
    }
  } else {
    const dirs = [[piece.p === 'X' ? 1 : -1, 0], [0, -1], [0, 1]];
    for (const [dr,dc] of dirs) {
      const mr = r+dr, mc = c+dc;
      const lr = r+2*dr, lc = c+2*dc;
      if (!inBounds(lr,lc)) continue;
      const mid = b[mr][mc];
      if (mid && mid.p !== piece.p && !b[lr][lc]) {
        out.push({r:lr, c:lc, captured:{r:mr, c:mc}});
      }
    }
  }
  return out;
}
function aiSimpleMoves(b, r, c) {
  const piece = b[r][c];
  if (!piece) return [];
  const out = [];
  if (piece.dame) {
    for (const [dr,dc] of ORTHO) {
      let nr = r+dr, nc = c+dc;
      while (inBounds(nr,nc) && !b[nr][nc]) { out.push({r:nr,c:nc}); nr += dr; nc += dc; }
    }
  } else {
    const dirs = [[piece.p === 'X' ? 1 : -1, 0], [0, -1], [0, 1]];
    for (const [dr,dc] of dirs) {
      const nr = r+dr, nc = c+dc;
      if (inBounds(nr,nc) && !b[nr][nc]) out.push({r:nr,c:nc});
    }
  }
  return out;
}
function applyMoveOnBoard(b, fr, fc, to, captured) {
  const nb = cloneBoard(b);
  nb[to.r][to.c] = nb[fr][fc];
  nb[fr][fc] = null;
  if (captured) nb[captured.r][captured.c] = null;
  const piece = nb[to.r][to.c];
  if (piece && !piece.dame) {
    if (piece.p === 'X' && to.r === SIZE-1) nb[to.r][to.c] = {p: piece.p, dame: true};
    if (piece.p === 'O' && to.r === 0)      nb[to.r][to.c] = {p: piece.p, dame: true};
  }
  return nb;
}
function chainCapturesRec(b, r, c, seq, results) {
  const next = aiCaptureMoves(b, r, c);
  if (next.length === 0) {
    results.push({sequence: seq.slice(), finalBoard: b});
    return;
  }
  // AI always takes the full chain (avoids surplace risk and is usually optimal).
  for (const m of next) {
    const seq2 = seq.slice();
    seq2.push({from:{r,c}, to:{r:m.r,c:m.c}, captured:m.captured});
    const nb = applyMoveOnBoard(b, r, c, {r:m.r,c:m.c}, m.captured);
    chainCapturesRec(nb, m.r, m.c, seq2, results);
  }
}
function enumerateTurns(b, player) {
  const results = [];
  const captureStarts = [];
  for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
    if (b[r][c] && b[r][c].p === player && aiCaptureMoves(b, r, c).length > 0) {
      captureStarts.push({r,c});
    }
  }
  if (captureStarts.length > 0) {
    for (const start of captureStarts) {
      for (const m of aiCaptureMoves(b, start.r, start.c)) {
        const seq = [{from: start, to: {r:m.r,c:m.c}, captured: m.captured}];
        const nb = applyMoveOnBoard(b, start.r, start.c, {r:m.r,c:m.c}, m.captured);
        chainCapturesRec(nb, m.r, m.c, seq, results);
      }
    }
  } else {
    for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
      if (b[r][c] && b[r][c].p === player) {
        for (const m of aiSimpleMoves(b, r, c)) {
          const seq = [{from:{r,c}, to:{r:m.r,c:m.c}}];
          const nb = applyMoveOnBoard(b, r, c, m, null);
          results.push({sequence: seq, finalBoard: nb});
        }
      }
    }
  }
  return results;
}
function evaluateBoard(b, aiP) {
  const oppP = aiP === 'X' ? 'O' : 'X';
  let myN=0, myD=0, opN=0, opD=0;
  let advScore = 0, centerScore = 0;
  for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
    const piece = b[r][c];
    if (!piece) continue;
    if (piece.p === aiP) { myN++; if (piece.dame) myD++; }
    else                 { opN++; if (piece.dame) opD++; }
    if (!piece.dame) {
      const adv = piece.p === 'X' ? r : (SIZE-1-r);
      advScore += (piece.p === aiP ? 1 : -1) * adv * 4;
    }
    if (r === 2 && c === 2) centerScore += (piece.p === aiP ? 12 : -12);
  }
  if (opN === 0) return 100000;
  if (myN === 0) return -100000;
  return (myN - opN) * 100 + (myD - opD) * 220 + advScore + centerScore;
}
let aiDeadline = 0;
function minimax(b, player, depth, alpha, beta, aiP) {
  if (aiDeadline && performance.now() > aiDeadline) throw 'timeout';
  if (depth === 0) return {score: evaluateBoard(b, aiP)};
  const turns = enumerateTurns(b, player);
  if (turns.length === 0) return {score: player === aiP ? -100000 : 100000};
  // Move ordering: longest capture sequences first → tighter alpha-beta pruning
  if (turns.length > 1) {
    turns.sort((a, c) => {
      const ac = a.sequence.filter(s => s.captured).length;
      const cc = c.sequence.filter(s => s.captured).length;
      return cc - ac;
    });
  }
  const oppP = player === 'X' ? 'O' : 'X';
  let bestTurn = null;
  if (player === aiP) {
    let bestScore = -Infinity;
    for (const t of turns) {
      const r = minimax(t.finalBoard, oppP, depth-1, alpha, beta, aiP);
      if (r.score > bestScore) { bestScore = r.score; bestTurn = t; }
      alpha = Math.max(alpha, bestScore);
      if (beta <= alpha) break;
    }
    return {score: bestScore, turn: bestTurn};
  } else {
    let bestScore = Infinity;
    for (const t of turns) {
      const r = minimax(t.finalBoard, oppP, depth-1, alpha, beta, aiP);
      if (r.score < bestScore) { bestScore = r.score; bestTurn = t; }
      beta = Math.min(beta, bestScore);
      if (beta <= alpha) break;
    }
    return {score: bestScore, turn: bestTurn};
  }
}

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const surplaceBtn = document.getElementById('surplaceBtn');
const COUDOU_DELAY_MS = 3000;
let coudouTimer = null;
function clearCoudouTimer() { if (coudouTimer) { clearTimeout(coudouTimer); coudouTimer = null; } }
function showCoudouBanner(label) {
  const b = document.getElementById('coudouBanner');
  if (!b) return;
  b.textContent = label || 'COUDOU !';
  b.classList.remove('show');
  void b.offsetHeight;
  b.classList.add('show');
  playSound('coudou');
}

const TURN_DURATION_MS = 30000;
let turnTimer = null;
let turnDeadline = null;
function clearTurnTimer() {
  if (turnTimer) { clearInterval(turnTimer); turnTimer = null; }
  turnDeadline = null;
  const el = document.getElementById('turnTimer');
  if (el) { el.textContent = ''; el.classList.remove('warn'); }
}
function renderTurnTimer() {
  const el = document.getElementById('turnTimer');
  if (!el || !turnDeadline) return;
  const left = Math.max(0, Math.ceil((turnDeadline - Date.now()) / 1000));
  el.textContent = `${left}s`;
  el.classList.toggle('warn', left <= 5);
}
function startTurnTimer() {
  clearTurnTimer();
  if (gameOver) return;
  if (vsAI && turn === aiColor) return;
  turnDeadline = Date.now() + TURN_DURATION_MS;
  renderTurnTimer();
  turnTimer = setInterval(() => {
    if (gameOver) { clearTurnTimer(); return; }
    renderTurnTimer();
    if (Date.now() >= turnDeadline) {
      clearTurnTimer();
      if (!online || (myColor === turn && !applyingRemote)) {
        broadcast({type:'pass'});
        passTurn();
      }
    }
  }, 250);
}
function executeAISequence(sequence, idx) {
  if (idx >= sequence.length) return;
  const step = sequence[idx];
  selected = {r: step.from.r, c: step.from.c};
  if (step.captured) {
    const moveObj = {r: step.to.r, c: step.to.c, captured: step.captured};
    doCapture(step.from.r, step.from.c, moveObj);
    setTimeout(() => {
      if (idx + 1 < sequence.length) {
        clearCoudouTimer();
        executeAISequence(sequence, idx + 1);
      } else {
        clearCoudouTimer();
        if (mustContinueFrom) endTurn();
      }
    }, 700);
  } else {
    doSimpleMove(step.from.r, step.from.c, step.to);
  }
}
function aiTurnIfNeeded() {
  if (!vsAI || gameOver || aiThinking) return;
  if (turn !== aiColor) return;
  if (mustContinueFrom) return;
  // Surplace human if they missed a capture
  if (surplaceTargets.size > 0) {
    aiThinking = true;
    setStatus(`Mariama t'a vu rater une capture…`);
    setTimeout(() => {
      aiThinking = false;
      if (!vsAI || gameOver || turn !== aiColor) return;
      const k = surplaceTargets.values().next().value;
      const [r, c] = k.split(',').map(Number);
      enterSurplace();
      handleSurplaceClick(r, c);
    }, 700);
    return;
  }
  aiThinking = true;
  setStatus(`Mariama réfléchit…`);
  // Defer so the UI can paint "réfléchit" before the (potentially long) compute
  setTimeout(() => {
    let result;
    if (aiDifficulty >= 99) {
      // Légende : iterative deepening avec budget de temps (≈3.5 s)
      // pour ne jamais figer la page, en gardant le meilleur coup trouvé.
      const total = countPieces('X') + countPieces('O');
      const maxDepth = total <= 6 ? 24 : total <= 10 ? 16 : total <= 14 ? 12 : 10;
      aiDeadline = performance.now() + 3500;
      let best = null;
      for (let d = 2; d <= maxDepth; d++) {
        try {
          const r = minimax(board, aiColor, d, -Infinity, Infinity, aiColor);
          if (r && r.turn) best = r;
        } catch (e) { break; }
        if (performance.now() > aiDeadline) break;
      }
      aiDeadline = 0;
      result = best || minimax(board, aiColor, 2, -Infinity, Infinity, aiColor);
    } else {
      result = minimax(board, aiColor, aiDifficulty, -Infinity, Infinity, aiColor);
    }
    aiThinking = false;
    if (!vsAI || gameOver || turn !== aiColor) return;
    if (!result.turn) { endTurn(); return; }
    executeAISequence(result.turn.sequence, 0);
  }, 80);
}

function passTurn() {
  if (gameOver) return;
  clearTurnTimer();
  clearCoudouTimer();
  const passer = turn === 'X' ? 'Vert' : 'Rouge';
  surplaceTargets = new Set();
  mustContinueFrom = null;
  selected = null;
  surplaceMode = false;
  pendingChain = null;
  captureCountThisTurn = 0;
  document.getElementById('surplaceBtn').textContent = 'Surplace';
  bindSurplace();
  turn = opponent(turn);
  if (allMovesForPlayer(turn).length === 0) {
    gameOver = true;
    setStatus(`${turn === 'X' ? 'Vert' : 'Rouge'} bloqué — victoire de ${opponent(turn) === 'X' ? 'Vert' : 'Rouge'} !`);
    endGameAnimation(opponent(turn));
    render();
    return;
  }
  snapshotPreMove();
  lastMoveTo = null;
  setStatus(`${passer} : temps écoulé. Au tour de ${turn === 'X' ? 'Vert' : 'Rouge'}`);
  render();
  startTurnTimer();
  aiTurnIfNeeded();
}

function demonstrateMove(curR, curC, originR, originC, demoMove, then) {
  const curCell = boardEl.querySelector(`[data-r="${curR}"][data-c="${curC}"]`);
  const movingPiece = curCell ? curCell.querySelector('.piece') : null;
  if (!movingPiece) { then(); return; }
  const glow = '0 0 0 4px #fdef42, inset 0 -4px 10px rgba(0,0,0,0.45), inset 0 4px 8px rgba(255,255,255,0.3), 0 4px 18px rgba(253,239,66,0.8)';
  movingPiece.style.zIndex = '999';
  const prevCellZ = curCell.style.zIndex;
  curCell.style.zIndex = '999';
  curCell.style.position = 'relative';

  if (!demoMove) {
    const anim = movingPiece.animate([
      { transform: 'scale(1)', boxShadow: 'none' },
      { transform: 'scale(1.2)', boxShadow: glow, offset: 0.5 },
      { transform: 'scale(1)', boxShadow: 'none' }
    ], { duration: 1500, easing: 'ease-in-out' });
    anim.onfinish = () => { movingPiece.style.zIndex = ''; curCell.style.zIndex = prevCellZ; then(); };
    return;
  }

  const originCell = boardEl.querySelector(`[data-r="${originR}"][data-c="${originC}"]`);
  const landCell = boardEl.querySelector(`[data-r="${demoMove.r}"][data-c="${demoMove.c}"]`);
  const capCell = boardEl.querySelector(`[data-r="${demoMove.captured.r}"][data-c="${demoMove.captured.c}"]`);
  const capPiece = capCell ? capCell.querySelector('.piece') : null;
  if (!originCell || !landCell) { movingPiece.style.zIndex = ''; curCell.style.zIndex = prevCellZ; then(); return; }

  const curRect = curCell.getBoundingClientRect();
  const originRect = originCell.getBoundingClientRect();
  const landRect = landCell.getBoundingClientRect();
  const dxO = originRect.left - curRect.left, dyO = originRect.top - curRect.top;
  const dxL = landRect.left - curRect.left,   dyL = landRect.top - curRect.top;
  const needsBacktrack = (originR !== curR || originC !== curC);

  const keyframes = [];
  let duration;
  if (needsBacktrack) {
    keyframes.push({ transform: 'translate(0,0)', boxShadow: 'none', offset: 0 });
    keyframes.push({ transform: `translate(${dxO}px, ${dyO}px)`, boxShadow: glow, offset: 0.2 });
    keyframes.push({ transform: `translate(${dxO}px, ${dyO}px)`, boxShadow: glow, offset: 0.32 });
    keyframes.push({ transform: `translate(${dxL}px, ${dyL}px)`, boxShadow: glow, offset: 0.7 });
    keyframes.push({ transform: `translate(${dxL}px, ${dyL}px)`, boxShadow: glow, offset: 0.85 });
    keyframes.push({ transform: 'translate(0,0)', boxShadow: 'none', offset: 1 });
    duration = 2400;
  } else {
    keyframes.push({ transform: 'translate(0,0)', boxShadow: 'none', offset: 0 });
    keyframes.push({ transform: 'translate(0,0)', boxShadow: glow, offset: 0.12 });
    keyframes.push({ transform: `translate(${dxL}px, ${dyL}px)`, boxShadow: glow, offset: 0.6 });
    keyframes.push({ transform: `translate(${dxL}px, ${dyL}px)`, boxShadow: glow, offset: 0.82 });
    keyframes.push({ transform: 'translate(0,0)', boxShadow: 'none', offset: 1 });
    duration = 2000;
  }

  if (capPiece) capPiece.classList.add('demo-jumped');
  const anim = movingPiece.animate(keyframes, { duration, easing: 'ease-in-out' });
  anim.onfinish = () => {
    movingPiece.style.zIndex = '';
    curCell.style.zIndex = prevCellZ;
    if (capPiece) capPiece.classList.remove('demo-jumped');
    then();
  };
}

// --- Confetti / defeat animation ---
function launchConfetti(opts) {
  const COLORS = (opts && opts.colors) || ['#00853f', '#fdef42', '#e31b23', '#ffffff'];
  const speedMul = (opts && opts.speed) || 1;
  const N = (opts && opts.count) || 180;
  let canvas = document.getElementById('confettiCanvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'confettiCanvas';
    canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
    document.body.appendChild(canvas);
  }
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      vx: (Math.random() - 0.5) * 4 * speedMul,
      vy: (2 + Math.random() * 4) * speedMul,
      size: 6 + Math.random() * 6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.3,
      shape: Math.random() < 0.5 ? 'rect' : 'circle',
    });
  }
  const start = performance.now();
  const DURATION = 5000;
  function frame(t) {
    const elapsed = t - start;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = elapsed > DURATION - 1200 ? Math.max(0, (DURATION - elapsed) / 1200) : 1;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (elapsed < DURATION) {
      requestAnimationFrame(frame);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  requestAnimationFrame(frame);
}

// Pluie lente verticale pour la défaite (pas de confettis joyeux)
function launchRain() {
  let canvas = document.getElementById('confettiCanvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'confettiCanvas';
    canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
    document.body.appendChild(canvas);
  }
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const drops = [];
  const N = 120;
  for (let i = 0; i < N; i++) {
    drops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      len: 12 + Math.random() * 18,
      speed: 3 + Math.random() * 3,
      alpha: 0.25 + Math.random() * 0.4,
    });
  }
  const start = performance.now();
  const DURATION = 4500;
  function frame(t) {
    const elapsed = t - start;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#7a8090';
    ctx.lineWidth = 1.4;
    const fadeFactor = elapsed > DURATION - 1000 ? Math.max(0, (DURATION - elapsed) / 1000) : 1;
    for (const d of drops) {
      d.y += d.speed;
      if (d.y > canvas.height + 20) { d.y = -20; d.x = Math.random() * canvas.width; }
      ctx.globalAlpha = d.alpha * fadeFactor;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + 1, d.y + d.len);
      ctx.stroke();
    }
    if (elapsed < DURATION) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(frame);
}

// Affiche un overlay "DÉFAITE" mélancolique : assombrissement progressif,
// texte qui descend lentement, secousse douce du plateau.
function showDefeatOverlay() {
  // 1. Voile sombre qui s'installe doucement sur l'écran
  let dim = document.getElementById('defeatDim');
  if (!dim) {
    dim = document.createElement('div');
    dim.id = 'defeatDim';
    dim.style.cssText = 'position:fixed;inset:0;background:radial-gradient(ellipse at center,'
      + 'rgba(20,10,15,0.55) 0%,rgba(5,2,8,0.85) 100%);z-index:9997;pointer-events:none;'
      + 'opacity:0;transition:opacity 1.6s ease-out;';
    document.body.appendChild(dim);
  }
  // 2. Texte "Défaite…" en gris triste, descend lentement, fade in/out long
  let el = document.getElementById('defeatOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'defeatOverlay';
    el.style.cssText = 'position:fixed;top:38%;left:50%;'
      + 'font-size:3em;letter-spacing:8px;font-weight:300;color:#9aa0b0;'
      + 'text-shadow:0 4px 18px rgba(0,0,0,0.95),0 0 30px rgba(120,80,90,0.4);'
      + 'z-index:9998;pointer-events:none;opacity:0;'
      + 'transition:opacity 1.4s ease-in-out,transform 3.5s cubic-bezier(.2,.6,.3,1);'
      + 'font-family:inherit;font-style:italic;';
    el.innerHTML = 'défaite<span style="display:block;font-size:0.4em;letter-spacing:4px;'
      + 'margin-top:8px;color:#6a7080;font-style:normal;">la prochaine sera la bonne</span>';
    document.body.appendChild(el);
  }
  el.style.opacity = '0';
  el.style.transform = 'translate(-50%,-30px)';
  dim.style.opacity = '0';
  requestAnimationFrame(() => {
    dim.style.opacity = '1';
    el.style.opacity = '1';
    el.style.transform = 'translate(-50%,40px)';
  });
  // Légère secousse triste du plateau (pas un gros shake — juste un soupir)
  if (boardEl) {
    boardEl.animate(
      [
        {transform: 'translateX(0)'},
        {transform: 'translateX(-4px)'},
        {transform: 'translateX(3px)'},
        {transform: 'translateX(-2px)'},
        {transform: 'translateX(0)'},
      ],
      {duration: 800, easing: 'ease-in-out'}
    );
  }
  setTimeout(() => {
    el.style.opacity = '0';
    dim.style.opacity = '0';
  }, 4200);
}

// Décide animation/son selon le contexte du joueur.
// winner: 'X', 'O', ou null (match nul)
function endGameAnimation(winner) {
  if (winner === null) return; // match nul : pas d'animation
  // Détermine ce que voit le joueur local.
  // - Local 2P : on montre les confettis pour le gagnant (les deux regardent l'écran).
  // - vs Mariama : si humain gagne → confettis ; si Mariama gagne → défaite.
  // - En ligne : myColor === winner → confettis ; sinon → défaite.
  let viewerWon;
  if (vsAI)        viewerWon = (winner === myColor);
  else if (online) viewerWon = (winner === myColor);
  else             viewerWon = true; // local 2P : on fête la victoire du gagnant
  if (viewerWon) {
    playSound('win');
    launchConfetti();
  } else {
    playSound('fail');
    showDefeatOverlay();
    launchRain();
  }
}

function render() {
  boardEl.innerHTML = '';
  const flipped = boardEl.classList.contains('flipped');
  for (let i = 0; i < SIZE; i++) {
    for (let j = 0; j < SIZE; j++) {
      const r = flipped ? SIZE - 1 - i : i;
      const c = flipped ? SIZE - 1 - j : j;
      const cell = document.createElement('div');
      let zone = '';
      if (r === 2 && c === 2) zone = ' center';
      else if (r < 2 || (r === 2 && c < 2)) zone = ' zone-X';
      else zone = ' zone-O';
      cell.className = 'cell' + zone;
      cell.dataset.r = r;
      cell.dataset.c = c;
      const piece = board[r][c];
      if (piece) {
        const p = document.createElement('div');
        p.className = 'piece ' + piece.p + (piece.dame ? ' dame' : '');
        const k = key(r,c);
        if (pendingAppear.has(k)) p.classList.add('appearing');
        if (pendingPromote.has(k)) p.classList.add('dame-promote');
        if (pendingChain === k) p.classList.add('chain-active');
        p.textContent = piece.p;
        cell.appendChild(p);
      }
      cell.addEventListener('click', () => onCellClick(r, c));
      boardEl.appendChild(cell);
    }
  }
  pendingAppear.clear();
  pendingPromote.clear();

  if (selected) {
    const sel = boardEl.querySelector(`[data-r="${selected.r}"][data-c="${selected.c}"]`);
    if (sel) sel.classList.add('selected');
  }

  document.getElementById('countX').textContent = countPieces('X');
  document.getElementById('countO').textContent = countPieces('O');

  const panelX = document.getElementById('panelX');
  const panelO = document.getElementById('panelO');
  panelX.classList.toggle('active-X', turn === 'X' && !gameOver);
  panelO.classList.toggle('active-O', turn === 'O' && !gameOver);

  surplaceBtn.disabled = mustContinueFrom !== null || gameOver || (online && !isMyTurn()) || (vsAI && turn === aiColor);
}

function addTrophy(killerPlayer) {
  // killerPlayer captured an opponent piece → opponent-colored trophy in killer's panel
  const opp = opponent(killerPlayer);
  const pile = document.getElementById('trophy' + killerPlayer);
  const t = document.createElement('div');
  t.className = 'trophy ' + opp;
  t.textContent = opp;
  pile.appendChild(t);
  if (killerPlayer === 'X') trophiesX++; else trophiesO++;
}

function animateCapture(r, c, killerPlayer, after) {
  const cell = boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  const piece = cell ? cell.querySelector('.piece') : null;
  if (piece) {
    piece.classList.add('dying');
    setTimeout(() => { addTrophy(killerPlayer); after(); }, 380);
  } else {
    addTrophy(killerPlayer);
    after();
  }
}

function setStatus(msg) {
  const safe = String(msg)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  statusEl.innerHTML = safe
    .replace(/\bVert\b/g, '<span class="name-X">Vert</span>')
    .replace(/\bRouge\b/g, '<span class="name-O">Rouge</span>');
}

function onCellClick(r, c) {
  if (gameOver) return;
  if (online && !applyingRemote && !isMyTurn()) return;
  if (vsAI && turn === aiColor && !aiThinking) return;
  if (vsAI && aiThinking) return;
  if (!applyingRemote) broadcast({type:'cellClick', r, c});
  if (surplaceMode) { handleSurplaceClick(r, c); return; }
  const piece = board[r][c];

  if (mustContinueFrom) {
    if (r === mustContinueFrom.r && c === mustContinueFrom.c) return;
    const caps = captureMoves(mustContinueFrom.r, mustContinueFrom.c);
    const target = caps.find(m => m.r === r && m.c === c);
    if (target) doCapture(mustContinueFrom.r, mustContinueFrom.c, target);
    return;
  }

  if (selected) {
    if (r === selected.r && c === selected.c) { selected = null; render(); return; }
    const caps = captureMoves(selected.r, selected.c);
    const cap = caps.find(m => m.r === r && m.c === c);
    if (cap) { doCapture(selected.r, selected.c, cap); return; }
    const moves = simpleMoves(selected.r, selected.c);
    const mv = moves.find(m => m.r === r && m.c === c);
    if (mv) { doSimpleMove(selected.r, selected.c, mv); return; }
    if (piece && piece.p === turn) { selected = {r,c}; render(); return; }
    selected = null; render(); return;
  }

  if (piece && piece.p === turn) { selected = {r,c}; render(); }
}

function doSimpleMove(fr, fc, to) {
  clearTurnTimer();
  if (turnStartFrom === null) turnStartFrom = {r:fr, c:fc};
  board[to.r][to.c] = board[fr][fc];
  board[fr][fc] = null;
  pendingAppear.add(key(to.r, to.c));
  playSound('move');
  if (maybePromote(to.r, to.c)) { pendingPromote.add(key(to.r, to.c)); playSound('dame'); }
  lastMoveTo = {r: to.r, c: to.c};
  selected = null;
  endTurn();
}

function doCapture(fr, fc, move) {
  clearTurnTimer();
  if (turnStartFrom === null) turnStartFrom = {r:fr, c:fc};
  turnDidCapture = true;
  clearCoudouTimer();
  const killer = turn;
  playSound('capture');
  animateCapture(move.captured.r, move.captured.c, killer, () => {
    board[move.r][move.c] = board[fr][fc];
    board[fr][fc] = null;
    board[move.captured.r][move.captured.c] = null;
    pendingAppear.add(key(move.r, move.c));
    if (maybePromote(move.r, move.c)) { pendingPromote.add(key(move.r, move.c)); playSound('dame'); }
    lastMoveTo = {r: move.r, c: move.c};
    mustContinueFrom = {r: move.r, c: move.c};
    selected = mustContinueFrom;
    const player = turn;
    captureCountThisTurn++;
    pendingChain = null;
    if (captureCountThisTurn >= 2) {
      showCoudouBanner(`COUDOU ×${captureCountThisTurn} !`);
    }
    setStatus(`${player === 'X' ? 'Vert' : 'Rouge'} : tour en cours...`);
    render();
    // Only the active player's client owns the auto-end timer; it broadcasts when it fires.
    if (!online || (myColor === turn && !applyingRemote)) {
      coudouTimer = setTimeout(() => {
        coudouTimer = null;
        if (mustContinueFrom) {
          broadcast({type:'autoEnd'});
          endTurn();
        }
      }, COUDOU_DELAY_MS);
    }
  });
}

function computeSurplaceTargets(playerWhoJustMoved, movedTo) {
  const targets = new Set();
  surplaceDemos = new Map();
  if (turnDidCapture) {
    if (movedTo) {
      const piece = board[movedTo.r][movedTo.c];
      if (piece) {
        const chainMoves = captureMoves(movedTo.r, movedTo.c);
        if (chainMoves.length > 0) {
          const k = key(movedTo.r, movedTo.c);
          targets.add(k);
          surplaceDemos.set(k, { origin: {r: movedTo.r, c: movedTo.c}, move: chainMoves[0] });
        }
      }
    }
    return targets;
  }
  for (const k of preMoveCaptureSet) {
    const [r,c] = k.split(',').map(Number);
    if (turnStartFrom && r === turnStartFrom.r && c === turnStartFrom.c) continue;
    const p = board[r][c];
    if (!p || p.p !== playerWhoJustMoved) continue;
    targets.add(k);
    const moves = preMoveCaptureMoves.get(k);
    if (moves && moves.length > 0) {
      surplaceDemos.set(k, { origin: {r, c}, move: moves[0] });
    }
  }
  if (turnStartFrom && movedTo) {
    const startKey = key(turnStartFrom.r, turnStartFrom.c);
    if (preMoveCaptureSet.has(startKey)) {
      const movedKey = key(movedTo.r, movedTo.c);
      targets.add(movedKey);
      const moves = preMoveCaptureMoves.get(startKey);
      if (moves && moves.length > 0) {
        surplaceDemos.set(movedKey, { origin: {r: turnStartFrom.r, c: turnStartFrom.c}, move: moves[0] });
      }
    }
  }
  return targets;
}

function autoPromoteIfLast() {
  for (const p of ['X','O']) {
    const positions = [];
    for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (board[r][c] && board[r][c].p===p) positions.push({r,c});
    if (positions.length === 1) {
      const piece = board[positions[0].r][positions[0].c];
      if (!piece.dame) {
        piece.dame = true;
        pendingPromote.add(key(positions[0].r, positions[0].c));
      }
    }
  }
}

function endTurn() {
  clearCoudouTimer();
  autoPromoteIfLast();
  surplaceTargets = computeSurplaceTargets(turn, lastMoveTo);
  mustContinueFrom = null;
  selected = null;
  pendingChain = null;
  captureCountThisTurn = 0;
  if (countPieces(opponent(turn)) === 0) {
    gameOver = true;
    setStatus(`Victoire de ${turn === 'X' ? 'Vert' : 'Rouge'} !`);
    endGameAnimation(turn);
    render();
    return;
  }
  turn = opponent(turn);
  if (allMovesForPlayer(turn).length === 0) {
    gameOver = true;
    setStatus(`${turn === 'X' ? 'Vert' : 'Rouge'} bloqué — victoire de ${opponent(turn) === 'X' ? 'Vert' : 'Rouge'} !`);
    endGameAnimation(opponent(turn));
    render();
    return;
  }
  snapshotPreMove();
  lastMoveTo = null;
  setStatus(`Au tour de ${turn === 'X' ? 'Vert' : 'Rouge'}`);
  render();
  startTurnTimer();
  aiTurnIfNeeded();
}

function enterSurplace() {
  if (gameOver || mustContinueFrom) return;
  surplaceMode = true;
  setStatus(`Surplace : clique sur le pion adverse`);
  const btn = document.getElementById('surplaceBtn');
  btn.textContent = 'Annuler';
  btn.onclick = () => {
    if (!applyingRemote) broadcast({type:'surplaceCancel'});
    cancelSurplace();
  };
  render();
}
function cancelSurplace() {
  surplaceMode = false;
  const btn = document.getElementById('surplaceBtn');
  btn.textContent = 'Surplace';
  bindSurplace();
  setStatus(`Au tour de ${turn === 'X' ? 'Vert' : 'Rouge'}`);
  render();
}
function bindSurplace() {
  const btn = document.getElementById('surplaceBtn');
  btn.onclick = () => {
    if (online && !isMyTurn()) return;
    if (!applyingRemote) broadcast({type:'surplaceEnter'});
    enterSurplace();
  };
}

function handleSurplaceClick(r, c) {
  const piece = board[r][c];
  if (!piece || piece.p === turn) { setStatus(`Choisis un pion adverse`); return; }
  if (!surplaceTargets.has(key(r,c))) { setStatus(`Surplace refusé`); return; }
  const killer = turn;
  const fautif = piece.p === 'X' ? 'Vert' : 'Rouge';
  let originR = r, originC = c, demo = null;
  const info = surplaceDemos.get(key(r, c));
  if (info) {
    originR = info.origin.r;
    originC = info.origin.c;
    demo = info.move;
  } else {
    const fallback = captureMoves(r, c);
    if (fallback.length > 0) demo = fallback[0];
  }
  const banner = document.getElementById('oopsBanner');
  if (banner) banner.classList.add('show');
  playSound('oops');
  setStatus(`Coup raté de ${fautif} ${demo ? '— voilà ce qu\'il devait jouer' : ''}`);
  const finish = () => {
    if (banner) banner.classList.remove('show');
    animateCapture(r, c, killer, () => {
      board[r][c] = null;
      surplaceTargets = new Set();
      surplaceMode = false;
      document.getElementById('surplaceBtn').textContent = 'Surplace';
      bindSurplace();
      autoPromoteIfLast();
      if (countPieces(opponent(turn)) === 0) {
        gameOver = true;
        clearTurnTimer();
        setStatus(`Victoire de ${turn === 'X' ? 'Vert' : 'Rouge'} !`);
        endGameAnimation(turn);
      } else {
        setStatus(`Au tour de ${turn === 'X' ? 'Vert' : 'Rouge'}`);
      }
      render();
      aiTurnIfNeeded();
    });
  };
  demonstrateMove(r, c, originR, originC, demo, finish);
}

function doDraw() {
  gameOver = true;
  clearTurnTimer();
  setStatus('Match nul');
  render();
}
function doDrawForfeit(loser) {
  gameOver = true;
  clearTurnTimer();
  const loserName = loser === 'X' ? 'Vert' : 'Rouge';
  const winnerName = loser === 'X' ? 'Rouge' : 'Vert';
  setStatus(`${loserName} a abusé du match nul (${MAX_DRAW_REQUESTS} demandes) — victoire de ${winnerName} !`);
  endGameAnimation(loser === 'X' ? 'O' : 'X');
  render();
}
function doReset() {
  initState();
  setStatus('Au tour de Vert');
  render();
  startTurnTimer();
  aiTurnIfNeeded();
}
function ask({title, message, okText='OK', cancelText='Annuler', danger=false}) {
  return new Promise(resolve => {
    const modal = document.getElementById('modal');
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMessage').textContent = message;
    const ok = document.getElementById('modalOk');
    const cancel = document.getElementById('modalCancel');
    ok.textContent = okText;
    cancel.textContent = cancelText;
    ok.className = danger ? 'danger' : '';
    modal.classList.remove('hidden');
    function close(v) {
      modal.classList.add('hidden');
      ok.onclick = null; cancel.onclick = null;
      resolve(v);
    }
    ok.onclick = () => close(true);
    cancel.onclick = () => close(false);
  });
}

document.getElementById('drawBtn').addEventListener('click', async () => {
  if (gameOver) return;
  if (vsAI) {
    // Quick AI evaluation: accept if AI is losing material, else refuse.
    const score = evaluateBoard(board, aiColor);
    if (score < -150) {
      await ask({title:'Match nul', message:'L\'IA accepte le match nul.', okText:'OK', cancelText:'OK'});
      doDraw();
    } else {
      await ask({title:'Match nul', message:'L\'IA refuse le match nul.', okText:'OK', cancelText:'OK'});
      setStatus('L\'IA a refusé le match nul');
    }
    return;
  }
  if (online) {
    const next = (drawRequests[myColor] || 0) + 1;
    const remaining = MAX_DRAW_REQUESTS - next;
    const isForfeit = remaining <= 0;
    const ok = await ask({
      title: isForfeit ? 'Dernière demande !' : 'Match nul',
      message: isForfeit
        ? `Ce sera ta ${MAX_DRAW_REQUESTS}e demande de match nul.\nTu perdras automatiquement la partie.\n\nConfirmer ?`
        : `Proposer le match nul à l'adversaire ?\n\n${next}/${MAX_DRAW_REQUESTS} — ${remaining} restante${remaining>1?'s':''} avant forfait`,
      okText: isForfeit ? 'Confirmer' : 'Proposer',
      danger: isForfeit
    });
    if (!ok) return;
    drawRequests[myColor] = next;
    if (next >= MAX_DRAW_REQUESTS) {
      send({type:'action', action:{type:'drawForfeit', loser: myColor}});
      doDrawForfeit(myColor);
      return;
    }
    send({type:'action', action:{type:'drawRequest', from: myColor}});
    setStatus(`Proposition de match nul envoyée… (${next}/${MAX_DRAW_REQUESTS})`);
  } else {
    const ok = await ask({
      title: 'Match nul',
      message: 'Match nul d\'un commun accord ?',
      okText: 'Accepter'
    });
    if (ok) doDraw();
  }
});
document.getElementById('resetBtn').addEventListener('click', () => {
  broadcast({type:'reset'});
  doReset();
});

initState();
bindSurplace();
render();

// --- Lobby wiring ---
const lobbyEl = document.getElementById('lobby');
const lobbyStatus = document.getElementById('lobbyStatus');
const myBadge = document.getElementById('myBadge');

async function applyRemoteAction(a) {
  applyingRemote = true;
  try {
    if (a.type === 'cellClick') onCellClick(a.r, a.c);
    else if (a.type === 'surplaceEnter') enterSurplace();
    else if (a.type === 'surplaceCancel') cancelSurplace();
    else if (a.type === 'autoEnd') { clearCoudouTimer(); if (mustContinueFrom) endTurn(); }
    else if (a.type === 'pass') passTurn();
    else if (a.type === 'draw') doDraw();
    else if (a.type === 'drawRequest') {
      if (a.from) drawRequests[a.from] = (drawRequests[a.from] || 0) + 1;
      const count = a.from ? drawRequests[a.from] : 0;
      const left = MAX_DRAW_REQUESTS - count;
      const suffix = a.from ? `\n\n${count}/${MAX_DRAW_REQUESTS} — ${left} avant son forfait` : '';
      const accept = await ask({
        title: 'Proposition de match nul',
        message: `L'adversaire propose le match nul.${suffix}`,
        okText: 'Accepter',
        cancelText: 'Refuser'
      });
      if (accept) {
        send({type:'action', action:{type:'drawAccept'}});
        doDraw();
      } else {
        send({type:'action', action:{type:'drawRefuse'}});
        setStatus('Match nul refusé');
      }
    }
    else if (a.type === 'drawAccept') doDraw();
    else if (a.type === 'drawRefuse') setStatus('L\'adversaire a refusé le match nul');
    else if (a.type === 'drawForfeit') doDrawForfeit(a.loser);
    else if (a.type === 'reset') doReset();
  } finally {
    applyingRemote = false;
  }
}

function connectSocket() {
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  socket = new WebSocket(proto + location.host);
  socket.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'created') {
      myColor = msg.color;
      lobbyStatus.innerHTML = `Code : <b>${msg.roomId}</b><br>En attente de l'adversaire…`;
    } else if (msg.type === 'opponentJoined') {
      online = true;
      lobbyEl.style.display = 'none';
      myBadge.innerHTML = ` <span class="badge-color ${myColor}">Tu es ${myColor === 'X' ? 'Vert' : 'Rouge'}</span>`;
      startTurnTimer();
    } else if (msg.type === 'joined') {
      myColor = msg.color;
      online = true;
      lobbyEl.style.display = 'none';
      myBadge.innerHTML = ` <span class="badge-color ${myColor}">Tu es ${myColor === 'X' ? 'Vert' : 'Rouge'}</span>`;
      startTurnTimer();
    } else if (msg.type === 'action') {
      applyRemoteAction(msg.action);
    } else if (msg.type === 'opponentLeft') {
      setStatus('Adversaire déconnecté');
      online = false;
    } else if (msg.type === 'error') {
      lobbyStatus.textContent = msg.message;
    }
  };
  socket.onerror = () => { lobbyStatus.textContent = 'Erreur de connexion'; };
}

document.getElementById('btnLocal').onclick = () => {
  online = false;
  vsAI = false;
  myColor = null;
  myBadge.innerHTML = ` <span class="badge-color X">2 joueurs locaux</span>`;
  lobbyEl.style.display = 'none';
  // Pas de flip en local : plateau standard (Vert haut, Rouge bas)
  if (boardEl) boardEl.classList.remove('flipped');
  render();
  startTurnTimer();
};
const aiModalEl = document.getElementById('aiModal');
document.getElementById('btnAI').onclick = () => {
  lobbyEl.style.display = 'none';
  aiModalEl.style.display = 'flex';
};
document.getElementById('btnAIBack').onclick = () => {
  aiModalEl.style.display = 'none';
  lobbyEl.style.display = 'flex';
};
let chosenSide = 'X'; // default: human plays Vert
function startVsAI(depth) {
  online = false;
  vsAI = true;
  myColor = chosenSide;
  aiColor = chosenSide === 'X' ? 'O' : 'X';
  aiDifficulty = depth;
  lobbyEl.style.display = 'none';
  aiModalEl.style.display = 'none';
  const label = depth===2?'Facile':depth===4?'Moyen':depth===6?'Difficile':'Expert';
  const sideName = chosenSide === 'X' ? 'Vert' : 'Rouge';
  myBadge.innerHTML = ` <span class="badge-color ${chosenSide}">Tu es ${sideName} (vs Mariama — ${label})</span>`;
  updateBoardOrientation();
  render();
  startTurnTimer();
  aiTurnIfNeeded();
}
function pickSide(side) {
  chosenSide = side;
  document.getElementById('btnSideX').classList.toggle('chosen', side === 'X');
  document.getElementById('btnSideO').classList.toggle('chosen', side === 'O');
}
let chosenPosition = 'bas'; // default: tes pions en bas de l'écran
function pickPosition(pos) {
  chosenPosition = pos;
  document.getElementById('btnPosTop').classList.toggle('chosen', pos === 'haut');
  document.getElementById('btnPosBot').classList.toggle('chosen', pos === 'bas');
  updateBoardOrientation();
  if (typeof render === 'function') render();
}
function shouldFlipBoard() {
  // Plateau par défaut : X (Vert) en haut (lignes 0-1), O (Rouge) en bas.
  // On flippe si la position voulue ne correspond pas au défaut.
  const myDefaultIsTop = chosenSide === 'X';
  const wantTop = chosenPosition === 'haut';
  return myDefaultIsTop !== wantTop;
}
function updateBoardOrientation() {
  if (!boardEl) return;
  boardEl.classList.toggle('flipped', shouldFlipBoard());
}
document.getElementById('btnSideX').onclick = () => { pickSide('X'); updateBoardOrientation(); if (typeof render === 'function') render(); };
document.getElementById('btnSideO').onclick = () => { pickSide('O'); updateBoardOrientation(); if (typeof render === 'function') render(); };
document.getElementById('btnPosTop').onclick = () => pickPosition('haut');
document.getElementById('btnPosBot').onclick = () => pickPosition('bas');
pickSide('X');
pickPosition('bas');
document.getElementById('btnAIEasy').onclick   = () => startVsAI(2);
document.getElementById('btnAIMedium').onclick = () => startVsAI(4);
document.getElementById('btnAIHard').onclick   = () => startVsAI(6);
document.getElementById('btnAILegend').onclick = () => startVsAI(99);
document.getElementById('btnCreate').onclick = () => {
  connectSocket();
  socket.addEventListener('open', () => send({type:'create'}), { once: true });
};
document.getElementById('btnJoin').onclick = () => {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!code) { lobbyStatus.textContent = 'Entre un code'; return; }
  connectSocket();
  socket.addEventListener('open', () => send({type:'join', roomId: code}), { once: true });
};
